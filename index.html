<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Yifei Luo</title>
  <style>
    :root {
      --text: #1f1f1f;
      --muted: #666;
      --line: #e9e9e9;
      --bg: #ffffff;
      --chip-bg: #fafafa;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: "Helvetica Neue", Arial, sans-serif;
      color: var(--text);
      background: var(--bg);
      line-height: 1.6;
    }

    .container {
      width: min(900px, 92vw);
      margin: 40px auto 80px;
    }

    .banner {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 8px;
      overflow: hidden;
      background: #fcfcfc;
    }

    .banner img {
      display: block;
      width: 100%;
      height: auto;
    }

    .intro {
      margin: 20px 0 4px;
      font-size: 1rem;
      color: var(--muted);
    }

    h1 {
      margin: 0;
      font-size: 1.9rem;
      font-weight: 600;
      letter-spacing: 0.2px;
    }

    .contact {
      margin-top: 2px;
      color: var(--muted);
      font-size: 0.98rem;
    }

    .contact a {
      color: inherit;
      text-decoration: none;
      border-bottom: 1px solid #d8d8d8;
    }

    .contact a:hover {
      border-bottom-color: #8d8d8d;
    }

    .nav {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin: 28px 0 34px;
    }

    .nav a {
      text-decoration: none;
      color: #fff;
      border: 1px solid #111;
      background: #111;
      border-radius: 999px;
      padding: 7px 16px;
      font-size: 0.92rem;
      transition: all 0.15s ease;
    }

    .nav a:hover {
      background: #2a2a2a;
      border-color: #2a2a2a;
    }

    h2 {
      margin: 0 0 12px;
      font-size: 1.2rem;
      font-weight: 600;
    }

    .news-list {
      margin: 0;
      padding-left: 18px;
      color: var(--text);
    }

    .news-list li {
      margin-bottom: 8px;
    }
  </style>
</head>
<body>
  <main class="container">
    <section class="banner" aria-label="Banner">
      <img
        src="assets/banner.png"
        alt="Banner photo"
      />
    </section>

    <p class="intro">Hi there, this is a short intro line and I will update it soon.</p>
    <h1>Yifei Luo (罗逸菲)</h1>
    <p class="contact">
      <a href="mailto:yifei.luo@rwth-aachen.de">yifei.luo@rwth-aachen.de</a>
    </p>

    <nav class="nav" aria-label="Main sections">
      <a href="#news">News</a>
      <a href="#papers">Papers</a>
      <a href="#projects">Projects</a>
      <a href="#events">Events</a>
      <a href="#moments">Moments</a>
      <a href="#cv">CV</a>
    </nav>

    <section id="news">
      <h2>News</h2>
      <ul class="news-list">
        <li>2026-04: This is a placeholder personal news line.</li>
      </ul>
    </section>

    <section id="papers"></section>
    <section id="projects"></section>
    <section id="events"></section>
    <section id="moments"></section>
    <section id="cv"></section>
  </main>
</body>
</html>
